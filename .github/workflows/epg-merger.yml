name: EPG Merger

on:
  schedule:
    - cron: '0 6 * * *'   # Cada día a las 06:00 UTC
  workflow_dispatch:        # Permite lanzarlo manualmente desde GitHub

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Publicar merged.xml en GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "EPG latest"
          body: "Actualizado automáticamente"
          files: merged.xml
          make_latest: true

      - name: Commit y push de channels.txt
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.txt
          git diff --staged --quiet || git commit -m "EPG update: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
